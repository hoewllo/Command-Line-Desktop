name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  BIN: cld

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          ./build/${{ env.BIN }} &
          PID=$!
          sleep 2
          kill $PID 2>/dev/null || true
          wait $PID || true

      - name: Stage binary for upload
        shell: bash
        run: |
          mkdir -p upload
          if [ -f "build/${{ env.BIN }}" ]; then
            cp "build/${{ env.BIN }}" "upload/${{ env.BIN }}"
          elif [ -f "build/Release/${{ env.BIN }}.exe" ]; then
            cp "build/Release/${{ env.BIN }}.exe" "upload/${{ env.BIN }}.exe"
          elif [ -f "build/${{ env.BIN }}.exe" ]; then
            cp "build/${{ env.BIN }}.exe" "upload/${{ env.BIN }}.exe"
          else
            echo "Binary not found!" && exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN }}-${{ runner.os }}
          path: upload/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.BIN }}-*

      - name: Rename for release
        run: |
          TAG="${{ github.ref_name }}"
          mv ${{ env.BIN }}-Linux/${{ env.BIN }}    "${TAG}-linux"    2>/dev/null || true
          mv ${{ env.BIN }}-macOS/${{ env.BIN }}    "${TAG}-macos"    2>/dev/null || true
          mv ${{ env.BIN }}-Windows/${{ env.BIN }}.exe "${TAG}-win.exe" 2>/dev/null || true
          chmod +x "${TAG}-linux" "${TAG}-macos" 2>/dev/null || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.ref_name }}-linux
            ${{ github.ref_name }}-macos
            ${{ github.ref_name }}-win.exe
          generate_release_notes: true
