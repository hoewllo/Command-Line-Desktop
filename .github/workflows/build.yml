name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  BIN_NAME: cld

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          ./build/cld &
          PID=$!
          sleep 2
          kill $PID 2>/dev/null || true
          wait $PID || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ runner.os }}
          path: |
            build/${{ env.BIN_NAME }}
            build/Release/${{ env.BIN_NAME }}.exe
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.BIN_NAME }}-*

      - name: Rename binaries for release
        run: |
          mv ${{ env.BIN_NAME }}-Linux/${{ env.BIN_NAME }}       ${{ env.BIN_NAME }}-linux      2>/dev/null || true
          mv ${{ env.BIN_NAME }}-macOS/${{ env.BIN_NAME }}       ${{ env.BIN_NAME }}-macos      2>/dev/null || true
          mv ${{ env.BIN_NAME }}-Windows/${{ env.BIN_NAME }}.exe ${{ env.BIN_NAME }}-win.exe    2>/dev/null || true
          chmod +x ${{ env.BIN_NAME }}-linux ${{ env.BIN_NAME }}-macos 2>/dev/null || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cld-linux
            cld-macos
            cld-win.exe
          generate_release_notes: true
